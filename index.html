<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Karte</title>
    
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
   
    <style>
        #find-me, #find-defi {
            background-color: #0e6127D7; 
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px; 
        }
        a:hover {
            color: rgb(7, 89, 7);
        }

    </style>
</head>

<body>

<header>
    <div class="logo-container">
        <img src="Logo_DF.png" alt="DeFind Logo" class="logo">
    </div>
    <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <nav>
        <ul>
            <li><a href="index.html" class="active">Standorte</a></li>
            <li><a href="Info.html">Info</a></li>
            <li><a href="Bedienungsanleitung.html">Bedienungsanleitung</a></li>
            <li><a href="Impressum.html">Impressum/DSGVO</a></li>
        </ul>
    </nav>
</header>

<!-- Karte -->
<div id="map" style="height: 500px; width: 100%;"></div>

<!-- Navigationsanzeige -->
<div id="nav-box" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%);
     background:#0e6127D7; color:white; padding:15px 25px; border-radius:12px; 
     font-size:18px; z-index:1000; text-align:center;">
    <div id="nav-pfeil" style="font-size:36px;">⬆️</div>
    <div id="nav-entfernung">-- m</div>
    <div id="nav-strasse" style="font-size:14px; margin-top:4px;"></div>
</div>

<!-- Entfernung vom Defi vom aktuellen Standort -->
<div id="entfernung" style="display:none;">
    <p>Entfernung: <span id="entfernung-wert">-- m</span></p>
</div>

<!-- Button für nächste Defi finden -->
<button id="find-defi">Finde den nächsten Defi</button>


<!-- Deine JS-Datei -->
<script src="js/menue.js"></script>
<script src="js/config.js"></script>
<script src="js/navigation.js"></script>
<script src="js/defi-daten.js"></script>
<script src="js/ui.js"></script>
<script src="js/routing.js"></script>
<script src="js/app.js"></script>



</body>
</html>
